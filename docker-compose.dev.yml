services:
  postgres:
    image: postgres:15-alpine
    ports:
      - "${DB_PORT:-5434}:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_dev_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set minio http://minio:9000 minioadmin minioadmin &&
        mc mb minio/kith-dev --ignore-existing
      "
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "4000:4000"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      SMTP_HOST: mailpit
      PHX_IP: "0.0.0.0"
      # Disable BEAM scheduler busy-waiting. By default idle schedulers spin on
      # their vCPU rather than sleeping, starving other threads in WSL2's shared
      # VM environment and adding latency to every request.
      ERL_FLAGS: "+sbwt none +sbwtdcpu none +sbwtdio none"
      # Disable expensive LiveView runtime checks (assign validation, slot checks,
      # etc.) which add overhead on every render cycle — too costly in Docker on Windows.
      PHX_EXPENSIVE_CHECKS: "false"
    volumes:
      # No Windows bind-mount for source — use `docker compose watch` instead.
      # deps/_build/node_modules stay as named volumes for fast recompilation.
      - deps:/app/deps
      - build:/app/_build
      - node_modules:/app/assets/node_modules
    develop:
      watch:
        # Sync Elixir source, config, migrations, and static assets into the
        # container via Docker's internal protocol — bypasses the slow WSL2↔Windows
        # filesystem bridge that makes `- .:/app` bind-mounts sluggish on Windows.
        - action: sync
          path: lib
          target: /app/lib
        - action: sync
          path: config
          target: /app/config
        - action: sync
          path: priv
          target: /app/priv
        - action: sync
          path: test
          target: /app/test
        - action: sync
          path: assets
          target: /app/assets
          ignore:
            - node_modules/
        # Dependency or tooling changes require a full image rebuild.
        - action: rebuild
          path: mix.exs
        - action: rebuild
          path: mix.lock
        - action: rebuild
          path: assets/package.json
        - action: rebuild
          path: assets/package-lock.json
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        mix deps.get &&
        cd assets && npm install && cd .. &&
        mix tailwind.install --if-missing &&
        mix esbuild.install --if-missing &&
        mix ecto.create &&
        mix ecto.migrate &&
        exec mix phx.server
      "

volumes:
  postgres_dev_data:
  minio_dev_data:
  deps:
  build:
  node_modules:
