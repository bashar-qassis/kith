name: Dev Build

on:
  workflow_dispatch:
    inputs:
      tag_suffix:
        description: "Optional tag suffix (e.g. 'rc1', 'alpha'). Leave empty for auto-generated dev tag."
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/bashar-qassis/kith

jobs:
  dev-build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute dev tag
        id: tag
        env:
          TAG_SUFFIX: ${{ github.event.inputs.tag_suffix }}
          BRANCH_REF: ${{ github.ref_name }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BRANCH=$(echo "$BRANCH_REF" | sed 's/[^a-zA-Z0-9._-]/-/g' | cut -c1-40)

          # Get base version from latest semver tag
          LATEST_TAG=$(git tag --list 'v*' --sort=-version:refname | head -n1)
          BASE_VERSION="${LATEST_TAG#v}"
          if [ -z "$BASE_VERSION" ]; then
            BASE_VERSION="0.0.0"
          fi

          if [ -n "$TAG_SUFFIX" ]; then
            # User-provided suffix: e.g. 0.2.0-rc1
            DEV_TAG="${BASE_VERSION}-${TAG_SUFFIX}"
          else
            # Auto-generated: e.g. 0.2.0-dev.main.a1b2c3d
            DEV_TAG="${BASE_VERSION}-dev.${BRANCH}.${SHORT_SHA}"
          fi

          echo "dev_tag=$DEV_TAG" >> "$GITHUB_OUTPUT"
          echo "Tag: $DEV_TAG"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.dev_tag }}
            ${{ env.IMAGE }}:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        env:
          DEV_TAG: ${{ steps.tag.outputs.dev_tag }}
        run: |
          echo "## Dev image published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** \`ghcr.io/bashar-qassis/kith:${DEV_TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Also tagged:** \`ghcr.io/bashar-qassis/kith:dev\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch:** \`${GITHUB_REF_NAME}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${GITHUB_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
